; Bolty — NTAG424 Bolt Card provisioner
; Supported targets:
;   - ESP32-DevKitC V4 + Sunfounder PN532 (headless mode)
;   - M5Stack Atom Matrix + Unit RFID (MFRC522 over I2C, headless mode)
;   - Original LILYGO TTGO T-Display

[env]
platform = espressif32
framework = arduino
extra_scripts = pre:scripts/pin_committed_build.py
monitor_speed = 115200
monitor_filters = direct

; Libraries
lib_deps =
    ; Core
    adafruit/Adafruit BusIO @ ^1.17.0
    arduino-libraries/Arduino_CRC32 @ ^1.0.0
    ; PN532 with NTAG424 support + ESP32 full-duplex SPI fix
    ; Local fork: /home/ubuntu/src/pn532/Adafruit-PN532-NTAG424
    ; Branch: fix/esp32-full-duplex-spi
    file:///home/ubuntu/src/pn532/Adafruit-PN532-NTAG424
    ; Display (optional — guarded by HAS_DISPLAY)
    bodmer/TFT_eSPI @ ^2.5.43
    ; Buttons (optional — guarded by HAS_BUTTONS)
    lennarthennigs/Button2 @ ^2.5.0
    ; WiFi/Web server (optional — guarded by HAS_WIFI)
    mathieucarbou/ESPAsyncWebServer @ ^3.1.2
    bblanchon/ArduinoJson @ ^7.0.0
    tobozo/ESP32-targz @ ^1.3.1
    ; QR code display (optional — guarded by HAS_DISPLAY)
    ricmoo/QRCode @ ^0.0.1

[env:esp32dev]
extends = env
board = esp32dev

; Upload — adjust to your board's serial port
upload_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0

; Partition table — default includes SPIFFS (needed for WiFi/web UI mode)
; Switch to huge_app.csv when running headless without SPIFFS
board_build.partitions = default.csv

; Build flags
;   BOARD_DEVKITC  — select DevKitC pin preset (default: TTGO T-Display)
;   HAS_WIFI=0     — disable WiFi for headless serial-only mode
;   USER_SETUP_LOADED — tell TFT_eSPI to use our User_Setup.h
;
; For headless mode on DevKitC:
build_flags = -DBOARD_DEVKITC -DHAS_WIFI=0 -DUSER_SETUP_LOADED -DNTAG424DEBUG
lib_ignore = TFT_eSPI, Button2, ESPAsyncWebServer, AsyncTCP, ArduinoJson, ESP32-targz, QRCode

[env:esp32dev-uart]
extends = env
board = esp32dev
upload_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
board_build.partitions = default.csv
build_flags = -DBOARD_DEVKITC_UART -DHAS_WIFI=0 -DUSER_SETUP_LOADED -DNTAG424DEBUG
lib_ignore = TFT_eSPI, Button2, ESPAsyncWebServer, AsyncTCP, ArduinoJson, ESP32-targz, QRCode

; For original TTGO T-Display (WiFi + display):
; build_flags = -DUSER_SETUP_LOADED
; lib_ignore =

[env:m5stack-atom-mfrc522]
extends = env
board = m5stack-atom
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified

; Stable by-id path for the attached Atom Matrix
upload_port = /dev/serial/by-id/usb-M5STACK_Inc._M5_Serial_Converter_9D529068B4-if00-port0

; Headless MFRC522 build does not need SPIFFS/web assets
board_build.partitions = huge_app.csv

build_flags = -DBOARD_M5STACK_ATOM_MFRC522 -DHAS_WIFI=0 -DHAS_WEB_LOOKUP=1 -DHAS_HTTP_PROBE -DUSER_SETUP_LOADED -DNTAG424DEBUG
lib_ignore = TFT_eSPI, Button2, ESPAsyncWebServer, AsyncTCP, ArduinoJson, ESP32-targz, QRCode

; Production build — same as above but without debug output (NTAG424DEBUG undefined)
[env:m5stack-atom-mfrc522-prod]
extends = env
board = m5stack-atom
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified

upload_port = /dev/serial/by-id/usb-M5STACK_Inc._M5_Serial_Converter_9D529068B4-if00-port0

board_build.partitions = huge_app.csv

build_flags = -DBOARD_M5STACK_ATOM_MFRC522 -DHAS_WIFI=0 -DHAS_WEB_LOOKUP=1 -DHAS_HTTP_PROBE -DUSER_SETUP_LOADED
lib_ignore = TFT_eSPI, Button2, ESPAsyncWebServer, AsyncTCP, ArduinoJson, ESP32-targz, QRCode

; M5Stack Atom with WiFi enabled — for online key lookup during inspect/wipe
; Uses default.csv partitions (includes SPIFFS for settings storage)
[env:m5stack-atom-mfrc522-wifi]
extends = env
board = m5stack-atom
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified

upload_port = /dev/serial/by-id/usb-M5STACK_Inc._6001-if00-port0

board_build.partitions = default.csv

build_flags = -DBOARD_M5STACK_ATOM_MFRC522 -DHAS_WIFI=1 -DHAS_HTTP_PROBE -DUSER_SETUP_LOADED -DNTAG424DEBUG
lib_ignore = TFT_eSPI, Button2
lib_extra_dirs = 
    ; WiFi build needs all web server libraries

; ── OTA mode ──────────────────────────────────────────────────────────────────
; Boots headless, checks for OTA update on each boot.
; Requires ota.env file (copy ota.env.example to ota.env).
;
; Quick-start:
;   cp ota.env.example ota.env   # then edit with your WiFi creds
;   pio run -e esp32dev-ota -t upload
;   python3 scripts/ota/serve.py  # on your host machine

[env:esp32dev-ota]
extends = env
board = esp32dev
upload_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
board_build.partitions = partitions/ota_huge_app.csv
build_flags = -DBOARD_DEVKITC -DHAS_WIFI=0 -DUSER_SETUP_LOADED -DNTAG424DEBUG -DBOLTY_OTA_ENABLED=1
lib_ignore = TFT_eSPI, Button2, ESPAsyncWebServer, AsyncTCP, ESP32-targz, QRCode
extra_scripts = 
    pre:scripts/pin_committed_build.py
    pre:scripts/ota/load_ca_cert.py
    pre:scripts/ota/load_env.py

[env:m5stack-atom-mfrc522-ota]
extends = env
board = m5stack-atom
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified
upload_port = /dev/serial/by-id/usb-M5STACK_Inc._M5_Serial_Converter_9D529068B4-if00-port0
board_build.partitions = partitions/ota_huge_app.csv
build_flags = -DBOARD_M5STACK_ATOM_MFRC522 -DHAS_WIFI=0 -DHAS_WEB_LOOKUP=1 -DHAS_HTTP_PROBE -DUSER_SETUP_LOADED -DNTAG424DEBUG -DBOLTY_OTA_ENABLED=1
lib_ignore = TFT_eSPI, Button2, ESPAsyncWebServer, AsyncTCP, ESP32-targz, QRCode
extra_scripts = 
    pre:scripts/pin_committed_build.py
    pre:scripts/ota/load_ca_cert.py
    pre:scripts/ota/load_env.py
