; Bolty — NTAG424 Bolt Card provisioner
; Adapted for ESP32-DevKitC V4 + Sunfounder PN532 (headless mode)
; Original: LILYGO TTGO T-Display

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial
monitor_speed = 115200
monitor_filters = direct

; Upload — adjust to your board's serial port
upload_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0

; Partition table — default includes SPIFFS (needed for WiFi/web UI mode)
; Switch to huge_app.csv when running headless without SPIFFS
board_build.partitions = default.csv

; Build flags
;   BOARD_DEVKITC  — select DevKitC pin preset (default: TTGO T-Display)
;   HAS_WIFI=0     — disable WiFi for headless serial-only mode
;   USER_SETUP_LOADED — tell TFT_eSPI to use our User_Setup.h
;
; For headless mode on DevKitC:
build_flags = -DBOARD_DEVKITC -DHAS_WIFI=0 -DUSER_SETUP_LOADED
lib_ignore = TFT_eSPI, Button2, ESPAsyncWebServer, AsyncTCP, ArduinoJson, ESP32-targz, QRCode
; For original TTGO T-Display (WiFi + display):
; build_flags = -DUSER_SETUP_LOADED
; lib_ignore =

; Libraries
lib_deps =
    ; Core
    adafruit/Adafruit BusIO @ ^1.17.0
    arduino-libraries/Arduino_CRC32 @ ^1.0.0
    ; PN532 with NTAG424 support
    ; Local fork: /home/ubuntu/src/pn532/Adafruit-PN532-NTAG424
    file:///home/ubuntu/src/pn532/Adafruit-PN532-NTAG424
    ; Display (optional — guarded by HAS_DISPLAY)
    bodmer/TFT_eSPI @ ^2.5.43
    ; Buttons (optional — guarded by HAS_BUTTONS)
    lennarthennigs/Button2 @ ^2.5.0
    ; WiFi/Web server (optional — guarded by HAS_WIFI)
    mathieucarbou/ESPAsyncWebServer @ ^3.1.2
    bblanchon/ArduinoJson @ ^7.0.0
    tobozo/ESP32-targz @ ^1.3.1
    ; QR code display (optional — guarded by HAS_DISPLAY)
    ricmoo/QRCode @ ^0.0.1
